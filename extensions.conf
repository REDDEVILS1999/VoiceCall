[voice-captcha]
exten => 6000,1,NoOp(Starting Dynamic Voice CAPTCHA)
same => n,AGI(get_captcha_config.py)
same => n,Set(CAPTCHA_RESULT=0)
same => n,Set(RETRIES=0)
same => n,While($[${RETRIES} < ${CAPTCHA_RETRIES}])
same => n,Playback(${CAPTCHA_PROMPT})
same => n,Read(USER_INPUT,beep,${CAPTCHA_LENGTH})
same => n,ExecIf($[${USER_INPUT} = ${CAPTCHA_CODE}]?Set(CAPTCHA_RESULT=1))
same => n,ExecIf($[${CAPTCHA_RESULT} = 1]?Break())
same => n,Set(RETRIES=$[${RETRIES} + 1])
same => n,EndWhile()
same => n,GotoIf($[${CAPTCHA_RESULT} = 1]?success:fail)

exten => 6000,n(success),NoOp(CAPTCHA Passed)
same => n,Playback(vm-goodbye)
same => n,Hangup()

exten => 6000,n(fail),NoOp(CAPTCHA Failed)
same => n,Playback(vm-goodbye)
same => n,Hangup()

